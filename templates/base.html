<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}ML Motors — Inventario y Caja{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://mlmotorselsalvador.com/wp-content/uploads/2026/05/Truck-portada.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(6, 14, 30, 0.65);
            z-index: 0;
            pointer-events: none;
        }
        /* Navbar */
        .navbar {
            background-color: #071224 !important;
            border-bottom: 2px solid #2a5a9a;
            position: relative;
            z-index: 10;
        }
        .navbar-brand {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            color: #ffffff !important;
            letter-spacing: 2px;
        }
        .nav-link { color: #c0cfe0 !important; font-size: .88rem; letter-spacing: .4px; }
        .nav-link:hover { color: #ffffff !important; }
        /* Layout */
        .main-wrapper { position: relative; z-index: 1; }
        .content-card {
            background: rgba(8, 18, 40, 0.93);
            border: 1px solid #1a3a6a;
            border-top: 3px solid #3a7acc;
            backdrop-filter: blur(6px);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            color: #e8f0fa;
        }
        /* Tipografia */
        h1, h2, h3, h4, h5 { color: #f0f6ff; }
        p, td, th, label, .form-text { color: #c0d0e4; }
        .text-muted { color: #6a82a0 !important; }
        /* Tablas */
        .table { color: #d0e0f0; border-color: #1a3060; }
        .table thead th { background-color: #071224; color: #8aaacа; border-color: #1a3060; }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: rgba(42,90,154,0.08); color: #d0e0f0;
        }
        .table-secondary { background-color: rgba(255,255,255,0.03) !important; color: #6a82a0 !important; }
        .table > :not(caption) > * > * { border-bottom-color: #1a3060; }
        /* Formularios */
        .form-control, .form-select {
            background-color: #071224;
            border: 1px solid #1a3a6a;
            color: #e8f0fa;
        }
        .form-control:focus, .form-select:focus {
            background-color: #071224;
            border-color: #3a7acc;
            color: #ffffff;
            box-shadow: 0 0 0 2px rgba(58,122,204,0.25);
        }
        .form-control::placeholder { color: #3a5070; }
        .form-label { color: #a0b8d0; }
        /* Cards internas */
        .card {
            background-color: #071224;
            border: 1px solid #1a3060;
            color: #e8f0fa;
        }
        .card-title { color: #6a8aaa; font-size: .8rem; letter-spacing: 1.5px; }
        /* Botones */
        .btn-primary    { background-color: #2a5a9a; border-color: #1a4a8a; color:#fff; }
        .btn-primary:hover { background-color: #1a4a8a; border-color: #0a3a7a; }
        .btn-outline-primary { color: #5a9adc; border-color: #3a7acc; }
        .btn-outline-primary:hover { background-color: #2a5a9a; color: #fff; border-color: #2a5a9a; }
        .btn-outline-secondary { color: #8aaac0; border-color: #2a4060; }
        .btn-outline-secondary:hover { background-color: #1a3060; color: #e8f0fa; border-color: #3a5a80; }
        .btn-success { background-color: #1a5c2e; border-color: #155226; color:#fff; }
        .btn-success:hover { background-color: #155226; }
        .btn-outline-success { color: #3acc5a; border-color: #3acc5a; }
        .btn-outline-success:hover { background-color: #1a5c2e; color: #fff; border-color: #1a5c2e; }
        .btn-danger  { background-color: #7a1a1a; border-color: #5a1010; color:#fff; }
        .btn-outline-danger  { color: #e08080; border-color: #c06060; }
        .btn-outline-danger:hover { background-color: #7a1a1a; color: #fff; border-color: #7a1a1a; }
        .btn-link    { color: #5a9adc; }
        /* Badges */
        .badge.bg-secondary { background-color: #2a4060 !important; }
        .badge.bg-info.text-dark { background-color: #1a3a6a !important; color: #80b0e8 !important; }
        .badge.bg-warning.text-dark { background-color: #3a3a10 !important; color: #c8b840 !important; }
        .badge.bg-primary { background-color: #2a5a9a !important; }
        .badge.bg-light.text-dark { background-color: #2a4060 !important; color: #a0b8d0 !important; }
        .badge.bg-danger { background-color: #7a1a1a !important; }
        .badge.bg-success { background-color: #1a5c2e !important; }
        /* Alerts */
        .alert { position: relative; z-index: 2; }
        .alert-success { background-color: #0a2010; border-color: #1a5c2e; color: #5ccc7a; }
        .alert-danger  { background-color: #200a0a; border-color: #7a1a1a; color: #e08080; }
        /* Modal */
        .modal-content { background-color: #071224; border: 1px solid #1a3a6a; color: #e8f0fa; }
        .modal-header  { border-bottom-color: #1a3060; }
        .modal-footer  { border-top-color: #1a3060; }
        .btn-close { filter: invert(1); }
        /* Misc */
        .text-danger { color: #e08080 !important; }
        .text-success { color: #3acc5a !important; }
        .text-warning { color: #c8b840 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('inicio') }}">ML MOTORS</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a>
                <a class="nav-link" href="{{ url_for('productos') }}">Productos</a>
                <a class="nav-link" href="{{ url_for('caja') }}">Caja</a>
                <a class="nav-link" href="{{ url_for('turnos') }}">Cortes de caja</a>
                <a class="nav-link" href="{{ url_for('reportes') }}">Reportes</a>
                <a class="nav-link" href="{{ url_for('configuracion') }}">Configuracion</a>
            </div>
        </div>
    </nav>

    <div class="container main-wrapper">
        {% with mensajes = get_flashed_messages(with_categories=true) %}
            {% if mensajes %}
                {% for categoria, mensaje in mensajes %}
                    <div class="alert {{ 'alert-danger' if categoria == 'error' else 'alert-success' }}">
                        {{ mensaje }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="content-card">
            {% block contenido %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
