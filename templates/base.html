<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Inventario y Caja{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('inicio') }}">📦 Inventario y Caja</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a>
                <a class="nav-link" href="{{ url_for('productos') }}">Productos</a>
                <a class="nav-link" href="{{ url_for('caja') }}">Caja</a>
                <a class="nav-link" href="{{ url_for('turnos') }}">Cortes de caja</a>
                <a class="nav-link" href="{{ url_for('reportes') }}">Reportes</a>
                <a class="nav-link" href="{{ url_for('configuracion') }}">⚙ Configuración</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% with mensajes = get_flashed_messages(with_categories=true) %}
            {% if mensajes %}
                {% for categoria, mensaje in mensajes %}
                    <div class="alert {{ 'alert-danger' if categoria == 'error' else 'alert-success' }}">
                        {{ mensaje }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block contenido %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
