<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}ML Motors — Inventario y Caja{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://mlmotorselsalvador.com/wp-content/uploads/2026/05/Truck-portada.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.30);
            z-index: 0;
            pointer-events: none;
        }
        .navbar {
            background-color: #1a3a5c !important;
            position: relative;
            z-index: 10;
        }
        .navbar-brand {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            color: #e8e8e8 !important;
            letter-spacing: 1px;
        }
        .main-wrapper {
            position: relative;
            z-index: 1;
        }
        .content-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .alert { position: relative; z-index: 2; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('inicio') }}">🚛 ML MOTORS</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a>
                <a class="nav-link" href="{{ url_for('productos') }}">Productos</a>
                <a class="nav-link" href="{{ url_for('caja') }}">Caja</a>
                <a class="nav-link" href="{{ url_for('turnos') }}">Cortes de caja</a>
                <a class="nav-link" href="{{ url_for('reportes') }}">Reportes</a>
                <a class="nav-link" href="{{ url_for('configuracion') }}">⚙ Configuración</a>
            </div>
        </div>
    </nav>

    <div class="container main-wrapper">
        {% with mensajes = get_flashed_messages(with_categories=true) %}
            {% if mensajes %}
                {% for categoria, mensaje in mensajes %}
                    <div class="alert {{ 'alert-danger' if categoria == 'error' else 'alert-success' }}">
                        {{ mensaje }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="content-card">
            {% block contenido %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
