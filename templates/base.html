<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}ML Motors — Inventario y Caja{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://mlmotorselsalvador.com/wp-content/uploads/2026/05/Truck-portada.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.30);
            z-index: 0;
            pointer-events: none;
        }
        .navbar {
            background-color: #1a3a5c !important;
            position: relative;
            z-index: 10;
        }
        .navbar-brand {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            color: #e8e8e8 !important;
            letter-spacing: 1px;
        }
        .main-wrapper {
            position: relative;
            z-index: 1;
        }
        .content-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
