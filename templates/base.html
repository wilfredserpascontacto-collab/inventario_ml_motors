<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}ML Motors — Inventario y Caja{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://mlmotorselsalvador.com/wp-content/uploads/2026/05/Truck-portada.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(4, 6, 12, 0.60);
            z-index: 0;
            pointer-events: none;
        }
        /* Navbar */
        .navbar {
            background-color: #0a0c10 !important;
            border-bottom: 2px solid #cc0000;
            position: relative;
            z-index: 10;
        }
        .navbar-brand {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            color: #cc0000 !important;
            letter-spacing: 2px;
        }
        .nav-link { color: #aab4c4 !important; font-size: .88rem; letter-spacing: .4px; }
        .nav-link:hover { color: #ffffff !important; }
        /* Layout */
        .main-wrapper { position: relative; z-index: 1; }
        .content-card {
            background: rgba(14, 20, 34, 0.94);
            border: 1px solid #1e2d44;
            border-top: 3px solid #cc0000;
            backdrop-filter: blur(6px);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            color: #ccd6e8;
        }
        /* Tipografia */
        h1, h2, h3, h4, h5 { color: #e4ecf7; }
        p, td, th, label, .form-text { color: #8a9ab0; }
        .text-muted { color: #4e6070 !important; }
        /* Tablas */
        .table { color: #b8c8d8; border-color: #1e2d44; }
        .table thead th { background-color: #0d1120; color: #8a9ab0; border-color: #1e2d44; }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: rgba(255,255,255,0.03); color: #b8c8d8;
        }
        .table-secondary { background-color: rgba(255,255,255,0.04) !important; color: #4e6070 !important; }
        .table > :not(caption) > * > * { border-bottom-color: #1e2d44; }
        /* Formularios */
        .form-control, .form-select {
            background-color: #0d1120;
            border: 1px solid #2a3a50;
            color: #ccd6e8;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0d1120;
            border-color: #cc0000;
            color: #ffffff;
            box-shadow: 0 0 0 2px rgba(204,0,0,0.20);
        }
        .form-control::placeholder { color: #3e5060; }
        .form-label { color: #8a9ab0; }
        /* Cards internas */
        .card {
            background-color: #0d1120;
            border: 1px solid #1e2d44;
            color: #ccd6e8;
        }
        .card-title { color: #6a7a8a; font-size: .8rem; letter-spacing: 1.5px; }
        /* Botones */
        .btn-primary    { background-color: #cc0000; border-color: #aa0000; color:#fff; }
        .btn-primary:hover { background-color: #aa0000; border-color: #880000; }
        .btn-outline-primary { color: #cc0000; border-color: #cc0000; }
        .btn-outline-primary:hover { background-color: #cc0000; color: #fff; }
        .btn-outline-secondary { color: #7a8a9a; border-color: #2a3a50; }
        .btn-outline-secondary:hover { background-color: #1e2d44; color: #ccd6e8; border-color: #3a4a60; }
        .btn-success { background-color: #1a5c2e; border-color: #155226; color:#fff; }
        .btn-success:hover { background-color: #155226; }
        .btn-outline-success { color: #3acc5a; border-color: #3acc5a; }
        .btn-outline-success:hover { background-color: #1a5c2e; color: #fff; border-color: #1a5c2e; }
        .btn-danger  { background-color: #8b0000; border-color: #6a0000; color:#fff; }
        .btn-outline-danger  { color: #e05050; border-color: #e05050; }
        .btn-outline-danger:hover { background-color: #8b0000; color: #fff; border-color: #8b0000; }
        .btn-link    { color: #6a8aaa; }
        /* Badges */
        .badge.bg-secondary { background-color: #2a3a50 !important; }
        .badge.bg-info.text-dark { background-color: #1a3a60 !important; color: #80b0e0 !important; }
        .badge.bg-warning.text-dark { background-color: #4a3a00 !important; color: #ccaa00 !important; }
        .badge.bg-primary { background-color: #8b0000 !important; }
        .badge.bg-light.text-dark { background-color: #2a3a50 !important; color: #8a9ab0 !important; }
        /* Alerts */
        .alert { position: relative; z-index: 2; }
        .alert-success { background-color: #0a2010; border-color: #1a5c2e; color: #5ccc7a; }
        .alert-danger  { background-color: #200a0a; border-color: #8b0000; color: #e08080; }
        /* Modal */
        .modal-content { background-color: #0d1120; border: 1px solid #2a3a50; color: #ccd6e8; }
        .modal-header  { border-bottom-color: #1e2d44; }
        .modal-footer  { border-top-color: #1e2d44; }
        .btn-close { filter: invert(1); }
        /* Misc */
        .text-danger { color: #e05050 !important; }
        .text-success { color: #3acc5a !important; }
        .text-warning { color: #ccaa00 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('inicio') }}">ML MOTORS</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a>
                <a class="nav-link" href="{{ url_for('productos') }}">Productos</a>
                <a class="nav-link" href="{{ url_for('caja') }}">Caja</a>
                <a class="nav-link" href="{{ url_for('turnos') }}">Cortes de caja</a>
                <a class="nav-link" href="{{ url_for('reportes') }}">Reportes</a>
                <a class="nav-link" href="{{ url_for('configuracion') }}">Configuracion</a>
            </div>
        </div>
    </nav>

    <div class="container main-wrapper">
        {% with mensajes = get_flashed_messages(with_categories=true) %}
            {% if mensajes %}
                {% for categoria, mensaje in mensajes %}
                    <div class="alert {{ 'alert-danger' if categoria == 'error' else 'alert-success' }}">
                        {{ mensaje }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="content-card">
            {% block contenido %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
