<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}ML Motors — Inventario y Caja{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://mlmotorselsalvador.com/wp-content/uploads/2026/05/Truck-portada.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(5, 8, 15, 0.72);
            z-index: 0;
            pointer-events: none;
        }
        /* ── Navbar ── */
        .navbar {
            background-color: #0a0c10 !important;
            border-bottom: 2px solid #cc0000;
            position: relative;
            z-index: 10;
        }
        .navbar-brand {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            color: #cc0000 !important;
            letter-spacing: 2px;
        }
        .nav-link { color: #b0b8c8 !important; font-size: .9rem; letter-spacing: .5px; }
        .nav-link:hover { color: #ffffff !important; }

        /* ── Contenedor principal ── */
        .main-wrapper { position: relative; z-index: 1; }
        .content-card {
            background: rgba(10, 13, 20, 0.93);
            border: 1px solid #1e2a3a;
            border-top: 3px solid #cc0000;
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            color: #d0d8e8;
        }

        /* ── Texto general ── */
        h1, h2, h3, h4, h5 { color: #e8edf5; }
        p, td, th, label, .form-text { color: #9aaabb; }
        .text-muted { color: #5a6a7a !important; }

        /* ── Tablas ── */
        .table { color: #c0ccd8; border-color: #1e2a3a; }
        .table thead { background-color: #0d1117; color: #9aaabb; }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: rgba(255,255,255,0.03); color: #c0ccd8;
        }
        .table-dark { background-color: #0d1117 !important; }
        .table-secondary { background-color: rgba(255,255,255,0.04) !important; color: #5a6a7a !important; }

        /* ── Formularios ── */
        .form-control, .form-select {
            background-color: #0d1117;
            border: 1px solid #2a3a4a;
            color: #d0d8e8;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0d1117;
            border-color: #cc0000;
            color: #ffffff;
            box-shadow: 0 0 0 2px rgba(204,0,0,0.25);
        }
        .form-control::placeholder { color: #4a5a6a; }

        /* ── Tarjetas internas ─
